name: Build Docker (multi-arch with armv7)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Stage 1: Build JS output on native amd64 ─────────────────────────
  # Next.js output is architecture-independent JS.
  # We build once and reuse for all platforms.
  build-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache JS build output
        id: cache-js
        uses: actions/cache@v4
        with:
          path: |
            .next
            dist-scripts
            node_modules
          key: js-build-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}

      - name: Install dependencies
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Compile scripts
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: |
          npx tsc scripts/rebuild-system-tags.ts \
            --outDir dist-scripts \
            --esModuleInterop --resolveJsonModule --skipLibCheck \
            --module commonjs --target ES2020

      - name: Build Next.js
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: |
          NEXT_TELEMETRY_DISABLED=1 \
          NODE_OPTIONS="--max-old-space-size=4096" \
          npm run build

      - name: Upload JS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-build-output
          path: |
            .next
            dist-scripts
          retention-days: 1

  # ── Stage 2: Build amd64 + arm64 images (native, fast) ───────────────
  build-amd64-arm64:
    needs: build-js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download JS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-build-output

      - name: Build and push amd64 + arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_BUILD=1

  # ── Stage 3: Build armv7 image (QEMU + pre-built JS) ────────────────
  build-armv7:
    needs: build-js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download JS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-build-output

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Download armv7 Prisma engines
        run: |
          mkdir -p engines/armv7
          BASE="https://github.com/idootop/armv7-prisma-engine/releases/download/5.14.0"
          curl -L -o engines/armv7/libquery_engine-linux-arm-openssl-3.0.x.so.node "${BASE}/libquery_engine"
          curl -L -o engines/armv7/schema-engine-linux-arm-openssl-3.0.x "${BASE}/schema-engine"
          curl -L -o engines/armv7/query-engine-linux-arm-openssl-3.0.x "${BASE}/query-engine"
          curl -L -o engines/armv7/prisma-fmt-linux-arm-openssl-3.0.x "${BASE}/prisma-fmt"
          ls -lh engines/armv7/

      - name: Download armv7 better-sqlite3 pre-compiled binary
        run: |
          mkdir -p better-sqlite3-prebuild
          # Node 22.x uses ABI version 127
          curl -L -o better-sqlite3-prebuild/better-sqlite3-v12.10.0-node-v127-linux-arm.tar.gz \
            "https://github.com/WiseLibs/better-sqlite3/releases/download/v12.10.0/better-sqlite3-v12.10.0-node-v127-linux-arm.tar.gz"
          ls -lh better-sqlite3-prebuild/

      - name: Build and push armv7
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm/v7
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-armv7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKIP_BUILD=1

  # ── Stage 4: Merge all three archs into one manifest ─────────────────
  merge-manifests:
    needs: [build-amd64-arm64, build-armv7]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker manifest create \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-arm64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-armv7

          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}

      - name: Verify manifest
        run: docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
