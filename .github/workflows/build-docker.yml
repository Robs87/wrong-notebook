name: Build Docker (multi-arch with armv7)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Stage 1: Build JS output on native amd64 (for armv7 reuse) ───────
  build-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache JS build output
        id: cache-js
        uses: actions/cache@v4
        with:
          path: |
            .next
            dist-scripts
          key: js-build-${{ hashFiles('package-lock.json', 'prisma/schema.prisma', 'src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}

      - name: Install dependencies
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Compile scripts
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: |
          npx tsc scripts/rebuild-system-tags.ts \
            --outDir dist-scripts \
            --esModuleInterop --resolveJsonModule --skipLibCheck \
            --module commonjs --target ES2020

      - name: Build Next.js
        if: steps.cache-js.outputs.cache-hit != 'true'
        run: |
          NEXT_TELEMETRY_DISABLED=1 \
          NODE_OPTIONS="--max-old-space-size=4096" \
          npm run build

      - name: Upload JS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-build-output
          path: |
            .next
            dist-scripts
          retention-days: 1

  # ── Stage 2: Build amd64 + arm64 images (standard Dockerfile) ────────
  build-amd64-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64 + arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Build armv7 image (QEMU + pre-built JS) ─────────────────
  build-armv7:
    needs: build-js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download JS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-build-output

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Download armv7 native binaries
        run: |
          mkdir -p engines/armv7 better-sqlite3-prebuild
          BASE="https://github.com/idootop/armv7-prisma-engine/releases/download/5.14.0"
          curl -L -o engines/armv7/libquery_engine-linux-arm-openssl-3.0.x.so.node "${BASE}/libquery_engine"
          curl -L -o engines/armv7/schema-engine-linux-arm-openssl-3.0.x "${BASE}/schema-engine"
          curl -L -o engines/armv7/query-engine-linux-arm-openssl-3.0.x "${BASE}/query-engine"
          curl -L -o engines/armv7/prisma-fmt-linux-arm-openssl-3.0.x "${BASE}/prisma-fmt"
          curl -L -o /tmp/sqlite3.tar.gz \
            "https://github.com/WiseLibs/better-sqlite3/releases/download/v12.10.0/better-sqlite3-v12.10.0-node-v127-linux-arm.tar.gz"
          tar xzf /tmp/sqlite3.tar.gz build/Release/better_sqlite3.node
          mv build/Release/better_sqlite3.node better-sqlite3-prebuild/
          rm -rf build /tmp/sqlite3.tar.gz
          ls -lh engines/armv7/ better-sqlite3-prebuild/

      - name: Generate armv7 Dockerfile
        run: |
          cat > Dockerfile.armv7 << 'DOCKERFILE'
          FROM node:22-alpine
          WORKDIR /app
          RUN apk add --no-cache su-exec openssl curl
          COPY package.json package-lock.json ./
          RUN npm ci --ignore-scripts
          COPY better-sqlite3-prebuild/better_sqlite3.node node_modules/better-sqlite3/build/Release/better_sqlite3.node
          COPY engines/armv7/ node_modules/@prisma/engines/
          ENV DATABASE_URL="file:/app/prisma/dev.db"
          ENV PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING=1
          ENV PRISMA_QUERY_ENGINE_LIBRARY=/app/node_modules/@prisma/engines/libquery_engine-linux-arm-openssl-3.0.x.so.node
          ENV PRISMA_SCHEMA_ENGINE_BINARY=/app/node_modules/@prisma/engines/schema-engine-linux-arm-openssl-3.0.x
          RUN npx prisma generate
          COPY .next .next
          COPY dist-scripts dist-scripts
          COPY prisma ./prisma
          COPY public ./public
          COPY config ./config
          COPY docker-entrypoint.sh ./
          COPY https-server.js ./
          RUN addgroup --system --gid 1001 nodejs && \
              adduser --system --uid 1001 nextjs && \
              mkdir -p /app/data && \
              chown -R nextjs:nodejs /app/data /app/.next
          ENV NODE_ENV=production
          ENV NEXT_TELEMETRY_DISABLED=1
          ENV PORT=3000
          ENV HOSTNAME="0.0.0.0"
          ENV DATABASE_URL="file:/app/data/dev.db"
          ENV AUTH_TRUST_HOST=true
          EXPOSE 3000
          ENTRYPOINT ["./docker-entrypoint.sh"]
          CMD ["node", "server.js"]
          DOCKERFILE
          echo "✅ Dockerfile.armv7 generated"

      - name: Build and push armv7
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm/v7
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-armv7
          file: Dockerfile.armv7

  # ── Stage 4: Merge all three archs into one manifest ─────────────────
  merge-manifests:
    needs: [build-amd64-arm64, build-armv7]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker manifest create \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-arm64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-armv7
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
      - name: Verify manifest
        run: docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
