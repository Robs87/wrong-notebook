name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # 测试阶段（仅 main 分支 push 或 PR）
  # ============================================
  unit-test:
    runs-on: ubuntu-latest
    name: Unit Tests
    # 只在非 tag push 时运行测试
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: unit-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run integration tests
        run: npm run test:integration

  build-check:
    runs-on: ubuntu-latest
    name: Build Check
    needs: integration-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: build-check
    timeout-minutes: 60
    env:
      DATABASE_URL: "file:./e2e.db"
      NEXTAUTH_SECRET: "ci-secret-value-123456"
      NEXTAUTH_URL: "http://127.0.0.1:3000"
      ADMIN_PASSWORD: "123456"
      ADMIN_PASSWORD_ALLOW_WEAK: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Database
        run: |
          npx prisma db push
          npx prisma db seed
          # E2E 注册流（auth-flow.spec）需要 allowRegistration=true：默认 false 会让 /register
          # 渲染“注册已禁用”卡片，缺少 input[name="name"] 导致测试超时。seed 后显式开启注册，
          # 仅写非敏感开关、不含任何密钥；复用生成好的 PrismaClient，确保写入运行时读取的同一个
          # SQLite 文件（DATABASE_URL=file:./e2e.db → prisma/e2e.db）。不改动生产逻辑。
          node -e 'const{PrismaClient}=require("@prisma/client");const p=new PrismaClient();const v=JSON.stringify({allowRegistration:true});p.appSetting.upsert({where:{id:1},update:{value:v},create:{id:1,value:v}}).then(function(){return p.$disconnect();}).then(function(){console.log("[e2e] AppSetting allowRegistration=true seeded");}).catch(function(e){console.error(e);process.exit(1);});'

      - name: Build application
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ============================================
  # Docker 构建（仅 tag push）
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build & Push
    # 只在 tag 推送时构建镜像
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            type=sha,prefix=sha-

      - name: Set up QEMU (Enable multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
